<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Discipline">
<title>Discipline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
:root{
  --g50:#EAF3DE;--g100:#C0DD97;--g200:#97C459;--g600:#3B6D11;--g800:#27500A;
  --r50:#FCEBEB;--r100:#F7C1C1;--r200:#F09595;--r600:#A32D2D;--r800:#791F1F;
  --b400:#378ADD;
  --bg:#0E0E0C;--card:#1A1A17;--card2:#222220;--border:#2C2C28;
  --text:#F2F0E8;--text2:#888880;--text3:#444440;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,20px);
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:var(--text);}

#app{position:fixed;inset:0;display:flex;flex-direction:column;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;}
#s-manage{transform:translateX(100%);opacity:0;pointer-events:none;}
#s-add{transform:translateX(100%);opacity:0;pointer-events:none;}
body.show-manage #s-main{transform:translateX(-30%);opacity:0;pointer-events:none;}
body.show-manage #s-manage{transform:none;opacity:1;pointer-events:all;}
body.show-add #s-manage{transform:translateX(-30%);opacity:0;pointer-events:none;}
body.show-add #s-add{transform:none;opacity:1;pointer-events:all;}

.topbar{padding-top:var(--safe-top);background:var(--bg);flex-shrink:0;}
.topbar-inner{padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;}
.date-str{font-size:13px;color:var(--text2);font-weight:400;letter-spacing:.02em;}
.top-btns{display:flex;gap:8px;}
.top-btn{width:44px;height:44px;border-radius:12px;background:var(--card2);border:1px solid var(--border);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.top-btn:active{transform:scale(.9);}

.hero{padding:8px 20px 16px;border-bottom:1px solid var(--border);}
.pts-row{display:flex;align-items:baseline;gap:8px;}
.pts-num{font-size:64px;font-weight:700;line-height:1;letter-spacing:-3px;transition:color .3s;}
.pts-unit{font-size:17px;color:var(--text2);}
.pts-flash{font-size:15px;font-weight:600;opacity:0;transition:opacity .5s;margin-left:4px;}
.pts-flash.on{opacity:1;}
.msg{font-size:13px;font-weight:500;margin-top:6px;min-height:18px;transition:color .3s;}
.msg.good{color:var(--g200);}
.msg.bad{color:var(--r200);}
.msg.mid{color:var(--text2);}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--text2);margin-top:8px;}

.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot) + 24px);}
.sec{padding:20px 20px 0;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}

.hcard{width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;padding:15px 16px;margin-bottom:9px;cursor:pointer;gap:14px;min-height:66px;transition:background .15s,border-color .15s,transform .1s;text-align:left;}
.hcard:active{transform:scale(.974);}
.hcard.done{background:#1A2E0F;border-color:#3B6D11;}
.hcard.bad-on{background:#2E0F0F;border-color:#791F1F;}
.hcard-left{flex:1;min-width:0;}
.hcard-name{font-size:16px;font-weight:500;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hcard.done .hcard-name{color:var(--g100);}
.hcard.bad-on .hcard-name{color:var(--r100);}
.hcard-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.hcard.done .hcard-sub{color:var(--g600);}
.hcard.bad-on .hcard-sub{color:var(--r600);}
.check-circle{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.hcard.done .check-circle{background:var(--g100);border-color:var(--g200);color:var(--g800);}

.bctr{display:flex;align-items:center;gap:2px;}
.bctr-btn{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-weight:300;}
.bctr-btn:active{transform:scale(.86);}
.hcard.bad-on .bctr-btn{background:#2E0F0F;border-color:#791F1F;}
.bctr-num{font-size:18px;font-weight:600;min-width:30px;text-align:center;color:var(--r200);}

.undo-row{display:flex;gap:10px;padding:16px 20px 0;}
.u-btn{flex:1;height:50px;background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:15px;cursor:pointer;color:var(--text2);}
.u-btn:active{transform:scale(.96);background:var(--card2);}

.week-wrap{padding:20px 20px 0;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.w-day{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.w-day:active .w-dot{transform:scale(.88);}
.w-dot{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:transform .1s;}
.w-dot.win{background:#1A2E0F;color:var(--g200);border:1px solid #3B6D11;}
.w-dot.loss{background:#2E0F0F;color:var(--r200);border:1px solid #791F1F;}
.w-dot.empty{background:var(--card2);}
.w-dot.cur{outline:2px solid var(--b400);outline-offset:2px;}
.w-label{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.04em;}
.week-total{text-align:center;font-size:12px;color:var(--text2);padding:10px 0 0;}

.nav-bar{padding-top:var(--safe-top);background:var(--bg);flex-shrink:0;}
.nav-inner{display:flex;align-items:center;gap:14px;padding:14px 20px 12px;border-bottom:1px solid var(--border);}
.back-btn{width:44px;height:44px;border-radius:12px;background:var(--card2);border:1px solid var(--border);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.back-btn:active{transform:scale(.9);}
.nav-title{font-size:18px;font-weight:600;color:var(--text);}
.nav-action{margin-left:auto;width:44px;height:44px;border-radius:12px;background:var(--b400);border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;}
.nav-action:active{transform:scale(.9);}

.act-item{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;padding:14px 16px;margin-bottom:8px;gap:12px;}
.act-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.act-dot.good{background:var(--g200);}
.act-dot.bad{background:var(--r200);}
.act-info{flex:1;min-width:0;}
.act-name{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.act-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.del-btn{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--border);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.del-btn:active{transform:scale(.88);background:#2E0F0F;border-color:#791F1F;color:var(--r200);}
.empty-state{color:var(--text3);font-size:14px;padding:8px 0 4px;}

.add-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;padding-bottom:calc(var(--safe-bot)+24px);}
.field{margin-bottom:20px;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;display:block;}
.field-input{width:100%;height:52px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0 16px;font-size:17px;color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;-webkit-user-select:auto;user-select:auto;}
.field-input:focus{outline:2px solid var(--b400);outline-offset:-1px;}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.type-btn{height:52px;border-radius:14px;border:1px solid var(--border);background:var(--card);font-size:16px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;}
.type-btn:active{transform:scale(.96);}
.type-btn.sel-good{background:#1A2E0F;border-color:var(--g600);color:var(--g100);}
.type-btn.sel-bad{background:#2E0F0F;border-color:var(--r600);color:var(--r100);}
.pts-grid{display:flex;flex-wrap:wrap;gap:8px;}
.pts-btn{height:46px;min-width:62px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:15px;font-weight:600;cursor:pointer;color:var(--text2);padding:0 14px;transition:all .15s;}
.pts-btn:active{transform:scale(.93);}
.pts-btn.sel{background:var(--b400);border-color:var(--b400);color:#fff;}
.save-btn{width:100%;height:56px;border-radius:16px;background:var(--text);border:none;font-size:17px;font-weight:700;cursor:pointer;color:var(--bg);margin-top:8px;}
.save-btn:active{transform:scale(.98);opacity:.9;}
</style>
</head>
<body>
<div id="app">

<!-- MAIN -->
<div class="screen" id="s-main">
  <div class="topbar">
    <div class="topbar-inner">
      <span class="date-str" id="date-str"></span>
      <div class="top-btns">
        <button class="top-btn" id="btn-prev">‹</button>
        <button class="top-btn" id="btn-next">›</button>
        <button class="top-btn" id="btn-manage">☰</button>
      </div>
    </div>
    <div class="hero">
      <div class="pts-row">
        <span class="pts-num" id="pts-num">0</span>
        <span class="pts-unit">pts</span>
        <span class="pts-flash" id="pts-flash"></span>
      </div>
      <div class="msg mid" id="msg-bar">Start your day strong.</div>
      <div class="streak-badge">🔥 <span id="streak-count">0 day streak</span></div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="sec"><div class="sec-label">Good habits</div><div id="good-list"></div></div>
    <div class="sec"><div class="sec-label">Bad habits / mistakes</div><div id="bad-list"></div></div>
    <div class="undo-row">
      <button class="u-btn" id="btn-undo">↩ Undo</button>
      <button class="u-btn" id="btn-redo">Redo ↪</button>
    </div>
    <div class="week-wrap">
      <div class="sec-label">This week</div>
      <div class="week-grid" id="week-grid"></div>
      <div class="week-total" id="week-total"></div>
    </div>
  </div>
</div>

<!-- MANAGE -->
<div class="screen" id="s-manage">
  <div class="nav-bar">
    <div class="nav-inner">
      <button class="back-btn" id="btn-back-manage">‹</button>
      <span class="nav-title">Activities</span>
      <button class="nav-action" id="btn-go-add">+</button>
    </div>
  </div>
  <div class="scroll-body" style="padding-top:16px;">
    <div class="sec"><div class="sec-label">Good habits</div><div id="manage-good"></div></div>
    <div class="sec" style="padding-top:16px;"><div class="sec-label">Bad habits</div><div id="manage-bad"></div></div>
  </div>
</div>

<!-- ADD -->
<div class="screen" id="s-add">
  <div class="nav-bar">
    <div class="nav-inner">
      <button class="back-btn" id="btn-back-add">‹</button>
      <span class="nav-title">New activity</span>
    </div>
  </div>
  <div class="add-body">
    <div class="field">
      <label class="field-label">Name</label>
      <input class="field-input" id="new-name" type="text" placeholder="e.g. Morning run" maxlength="30" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <label class="field-label">Type</label>
      <div class="type-row">
        <button class="type-btn sel-good" id="type-good" onclick="selType('good')">Good +pts</button>
        <button class="type-btn" id="type-bad" onclick="selType('bad')">Bad −pts</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Points</label>
      <div class="pts-grid" id="pts-grid">
        <button class="pts-btn sel" onclick="selPts(5)">5</button>
        <button class="pts-btn" onclick="selPts(10)">10</button>
        <button class="pts-btn" onclick="selPts(15)">15</button>
        <button class="pts-btn" onclick="selPts(20)">20</button>
        <button class="pts-btn" onclick="selPts(25)">25</button>
        <button class="pts-btn" onclick="selPts(50)">50</button>
      </div>
    </div>
    <button class="save-btn" onclick="saveActivity()">Add activity</button>
  </div>
</div>

</div>
<script>
var DEFAULT=[
  {id:'wake',name:'Wake up before 9',type:'good',pts:10},
  {id:'gym',name:'Gym',type:'good',pts:15},
  {id:'dsa',name:'DSA / Prep',type:'good',pts:15},
  {id:'lang',name:'Language',type:'good',pts:5},
  {id:'content',name:'Content',type:'good',pts:5},
  {id:'cardio',name:'Cardio',type:'good',pts:5},
  {id:'social',name:'Socialising',type:'good',pts:5},
  {id:'mistake',name:'Mistake',type:'bad',pts:50}
];
var S={acts:[],days:{}};
try{var raw=localStorage.getItem('disc_v2');if(raw)S=JSON.parse(raw);}catch(e){}
if(!S.acts||!S.acts.length)S.acts=JSON.parse(JSON.stringify(DEFAULT));
var offset=0,hist=[],hIdx=-1,newType='good',newPts=5;

function save(){try{localStorage.setItem('disc_v2',JSON.stringify(S));}catch(e){}}
function dayKey(o){var d=new Date();d.setDate(d.getDate()+(o||0));return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function getDay(o){var k=dayKey(o);if(!S.days[k])S.days[k]={done:{},counts:{}};return S.days[k];}
function calcPts(day){
  var p=0;
  S.acts.forEach(function(a){
    if(a.type==='good'&&day.done[a.id])p+=a.pts;
    if(a.type==='bad')p-=(day.counts[a.id]||0)*a.pts;
  });
  return p;
}
function snap(){return JSON.parse(JSON.stringify(S));}
function pushSnap(){hist=hist.slice(0,hIdx+1);hist.push(snap());hIdx=hist.length-1;}
function calcStreak(){
  var s=0;
  for(var i=0;i>=-365;i--){
    var k=dayKey(i);
    if(S.days[k]&&calcPts(S.days[k])>0)s++;else break;
  }
  return s;
}
var GOOD=["You're crushing it.","Pure discipline.","Locked in. Nothing stops you.","Unstoppable. Don't break the chain.","That's the standard. Hold it."];
var BAD=["You just destroyed your future.","Every mistake costs you.","Pathetic. Fix it tomorrow.","Wasted potential. Own it.","You let yourself down. Again."];
var MID=["Decent. Push harder.","Not enough yet.","More to do. Don't relax.","Almost there. Don't stop.","Solid start. Don't waste it."];
function getMsg(p,hasBad){
  if(hasBad)return BAD[Math.floor(Math.random()*BAD.length)];
  if(p>=40)return GOOD[Math.floor(Math.random()*GOOD.length)];
  if(p>0)return MID[Math.floor(Math.random()*MID.length)];
  return"Start your day strong.";
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  var day=getDay(offset);
  var p=calcPts(day);
  var hasBad=S.acts.some(function(a){return a.type==='bad'&&(day.counts[a.id]||0)>0;});
  var pn=document.getElementById('pts-num');
  pn.textContent=p;
  pn.style.color=p<0?'#F09595':p>=40?'#97C459':'#F2F0E8';
  var mb=document.getElementById('msg-bar');
  mb.textContent=getMsg(p,hasBad);
  mb.className='msg '+(hasBad?'bad':p>=40?'good':'mid');
  document.getElementById('streak-count').textContent=calcStreak()+' day streak';
  var d=new Date();d.setDate(d.getDate()+offset);
  var DNS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MNS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-str').textContent=DNS[d.getDay()]+', '+d.getDate()+' '+MNS[d.getMonth()];
  var gl=document.getElementById('good-list'),bl=document.getElementById('bad-list');
  gl.innerHTML='';bl.innerHTML='';
  var goods=S.acts.filter(function(a){return a.type==='good';});
  var bads=S.acts.filter(function(a){return a.type==='bad';});
  if(!goods.length)gl.innerHTML='<div class="empty-state">No good habits — add via ☰</div>';
  goods.forEach(function(a){
    var done=!!day.done[a.id];
    var el=document.createElement('div');
    el.className='hcard'+(done?' done':'');
    el.innerHTML='<div class="hcard-left"><span class="hcard-name">'+esc(a.name)+'</span><span class="hcard-sub">+'+(a.pts)+' pts'+(done?' · Done ✓':'')+'</span></div>'
      +'<div class="check-circle">'+(done?'✓':'')+'</div>';
    tap(el,function(){toggleGood(a.id,a.pts);});
    gl.appendChild(el);
  });
  if(!bads.length)bl.innerHTML='<div class="empty-state">No bad habits — add via ☰</div>';
  bads.forEach(function(a){
    var cnt=day.counts[a.id]||0,on=cnt>0;
    var el=document.createElement('div');
    el.className='hcard'+(on?' bad-on':'');
    el.innerHTML='<div class="hcard-left"><span class="hcard-name">'+esc(a.name)+'</span><span class="hcard-sub">−'+(a.pts)+' pts each'+(on?' · −'+(cnt*a.pts)+' total':'')+'</span></div>'
      +'<div class="bctr"><button class="bctr-btn dec-btn">−</button><span class="bctr-num">'+cnt+'</span><button class="bctr-btn inc-btn">+</button></div>';
    el.querySelector('.inc-btn').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();changeBad(a.id,a.pts,1);});
    el.querySelector('.inc-btn').addEventListener('click',function(e){e.stopPropagation();changeBad(a.id,a.pts,1);});
    el.querySelector('.dec-btn').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();changeBad(a.id,a.pts,-1);});
    el.querySelector('.dec-btn').addEventListener('click',function(e){e.stopPropagation();changeBad(a.id,a.pts,-1);});
    bl.appendChild(el);
  });
  renderWeek();
}

function renderWeek(){
  var grid=document.getElementById('week-grid');grid.innerHTML='';
  var DNS=['S','M','T','W','T','F','S'],weekPts=0;
  var dow=new Date().getDay();
  for(var i=0;i<7;i++){
    var off=i-dow,k=dayKey(off);
    var d=new Date();d.setDate(d.getDate()+off);
    var dv=document.createElement('div');dv.className='w-day';
    var dot=document.createElement('div');
    var hasData=S.days[k]&&(Object.keys(S.days[k].done||{}).some(function(id){return S.days[k].done[id];})||Object.keys(S.days[k].counts||{}).some(function(id){return(S.days[k].counts[id]||0)>0;}));
    if(off>0){dot.className='w-dot empty';}
    else if(hasData){var dp=calcPts(S.days[k]);dot.className='w-dot '+(dp>=0?'win':'loss');dot.textContent=Math.abs(dp)>99?'99+':dp;weekPts+=dp;}
    else{dot.className='w-dot empty';}
    if(off===offset)dot.className+=' cur';
    var dl=document.createElement('div');dl.className='w-label';dl.textContent=DNS[d.getDay()];
    dv.appendChild(dot);dv.appendChild(dl);
    (function(o){tap(dv,function(){offset=o;render();});})(off);
    grid.appendChild(dv);
  }
  document.getElementById('week-total').textContent='Week total: '+weekPts+' pts';
}

function flash(delta){
  var el=document.getElementById('pts-flash');
  el.textContent=(delta>0?'+':'')+delta;
  el.style.color=delta>0?'#97C459':'#F09595';
  el.className='pts-flash on';
  setTimeout(function(){el.className='pts-flash';},900);
}
function toggleGood(id,pts){pushSnap();var day=getDay(offset);day.done[id]=!day.done[id];flash(day.done[id]?pts:-pts);save();render();}
function changeBad(id,pts,dir){pushSnap();var day=getDay(offset);day.counts[id]=Math.max(0,(day.counts[id]||0)+dir);flash(dir>0?-pts:pts);save();render();}

function tap(el,fn){
  var moved=false;
  el.addEventListener('touchstart',function(){moved=false;},{passive:true});
  el.addEventListener('touchmove',function(){moved=true;},{passive:true});
  el.addEventListener('touchend',function(e){if(!moved){e.preventDefault();fn();}});
  el.addEventListener('click',fn);
}

function selType(t){
  newType=t;
  document.getElementById('type-good').className='type-btn'+(t==='good'?' sel-good':'');
  document.getElementById('type-bad').className='type-btn'+(t==='bad'?' sel-bad':'');
}
function selPts(p){
  newPts=p;
  document.getElementById('pts-grid').querySelectorAll('.pts-btn').forEach(function(b){
    b.className='pts-btn'+(parseInt(b.textContent)===p?' sel':'');
  });
}
function saveActivity(){
  var name=document.getElementById('new-name').value.trim();
  if(!name)return;
  pushSnap();
  S.acts.push({id:'act_'+Date.now(),name:name,type:newType,pts:newPts});
  document.getElementById('new-name').value='';
  selType('good');selPts(5);
  save();renderManage();goBack();
}
function deleteActivity(id){
  if(!confirm('Delete this activity?'))return;
  pushSnap();S.acts=S.acts.filter(function(a){return a.id!==id;});save();renderManage();render();
}
function renderManage(){
  var mg=document.getElementById('manage-good'),mb=document.getElementById('manage-bad');
  mg.innerHTML='';mb.innerHTML='';
  function makeItem(a,list){
    var el=document.createElement('div');el.className='act-item';
    el.innerHTML='<div class="act-dot '+a.type+'"></div>'
      +'<div class="act-info"><div class="act-name">'+esc(a.name)+'</div><div class="act-meta">'+(a.type==='good'?'+':'-')+a.pts+' pts</div></div>'
      +'<button class="del-btn">✕</button>';
    el.querySelector('.del-btn').addEventListener('touchend',function(e){e.preventDefault();deleteActivity(a.id);});
    el.querySelector('.del-btn').addEventListener('click',function(){deleteActivity(a.id);});
    list.appendChild(el);
  }
  var goods=S.acts.filter(function(a){return a.type==='good';});
  var bads=S.acts.filter(function(a){return a.type==='bad';});
  if(!goods.length)mg.innerHTML='<div class="empty-state">No good habits yet.</div>';
  goods.forEach(function(a){makeItem(a,mg);});
  if(!bads.length)mb.innerHTML='<div class="empty-state">No bad habits yet.</div>';
  bads.forEach(function(a){makeItem(a,mb);});
}

function goManage(){document.body.className='show-manage';renderManage();}
function goAdd(){document.body.className='show-manage show-add';}
function goBack(){
  if(document.body.className.indexOf('show-add')>=0){document.body.className='show-manage';}
  else{document.body.className='';render();}
}

tap(document.getElementById('btn-manage'),goManage);
tap(document.getElementById('btn-go-add'),goAdd);
tap(document.getElementById('btn-back-manage'),goBack);
tap(document.getElementById('btn-back-add'),goBack);
tap(document.getElementById('btn-prev'),function(){offset--;render();});
tap(document.getElementById('btn-next'),function(){if(offset<0){offset++;render();}});
tap(document.getElementById('btn-undo'),function(){if(hIdx<0)return;S=JSON.parse(JSON.stringify(hist[hIdx]));hIdx--;save();render();});
tap(document.getElementById('btn-redo'),function(){if(hIdx>=hist.length-1)return;hIdx++;S=JSON.parse(JSON.stringify(hist[hIdx]));save();render();});

render();
</script>
</body>
</html>
